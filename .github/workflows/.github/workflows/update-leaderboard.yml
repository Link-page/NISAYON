name: Update Kick Leaderboard

on:
  schedule:
    - cron: '*/15 * * * *' # רץ אוטומטית כל 15 דקות
  workflow_dispatch: # מאפשר לך להריץ ידנית בלחיצת כפתור

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch Latest Leaderboard
        env:
          KICK_API_KEY: ${{ secrets.KICK_API_KEY }}
        run: node fetch-leaderboard.js

      - name: Commit and Push Changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add leaderboard.json
          # יבצע שמירה רק אם הנתונים באמת השתנו
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update leaderboard data" && git push)
