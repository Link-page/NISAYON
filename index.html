<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RonenGG | Official Links</title>

  <link rel="icon" type="image/webp" href="profile.webp">
  <link rel="apple-touch-icon" href="profile.webp">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');

    :root {
      --accent-hue: 230;
      --accent: #ffffff;
      --accent-soft: rgba(255,255,255,0.12);
      --accent-glow: rgba(255,255,255,0.28);
      --spotlight-color: rgba(156, 128, 255, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #050505;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 140, 0, 0.4);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 140, 0, 0.8);
    }

    body {
      font-family: 'Heebo', sans-serif;
      background-color: #000000;
      /* רקע כהה נקי כדי לתת לחלקיקים לבלוט */
      background-image:
        radial-gradient(circle at 50% 50%, rgba(255, 140, 0, 0.05) 0%, transparent 60%),
        linear-gradient(135deg, #020202 0%, #0a0500 50%, #020202 100%);
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      color: white;
    }

    /* === אפקט חלקיקי האנרגיה (Option 1) === */
    #particles-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      /* גורם לחלקיקים להיעלם בעדינות בקצוות המסך */
      mask-image: radial-gradient(circle at center, black 10%, transparent 85%);
      -webkit-mask-image: radial-gradient(circle at center, black 10%, transparent 85%);
    }

    .particle-layer {
      position: absolute;
      inset: 0;
      background-repeat: repeat;
    }

    /* שכבה 1 - חלקיקים קטנים ורחוקים (איטיים) */
    .layer-1 {
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 140, 0, 0.8) 1.5px, transparent 1.5px),
        radial-gradient(circle at 40% 60%, rgba(255, 170, 0, 0.9) 2px, transparent 2px),
        radial-gradient(circle at 70% 30%, rgba(255, 255, 255, 0.8) 1px, transparent 1px),
        radial-gradient(circle at 90% 80%, rgba(255, 100, 0, 0.9) 2px, transparent 2px);
      background-size: 150px 150px;
      animation: driftUp1 25s linear infinite;
      filter: drop-shadow(0 0 3px rgba(255, 140, 0, 0.8));
    }

    /* שכבה 2 - חלקיקים בינוניים (מהירות בינונית) */
    .layer-2 {
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(255, 140, 0, 0.6) 2.5px, transparent 2.5px),
        radial-gradient(circle at 60% 10%, rgba(255, 100, 0, 0.7) 3px, transparent 3px),
        radial-gradient(circle at 80% 50%, rgba(255, 255, 255, 0.6) 2px, transparent 2px);
      background-size: 220px 220px;
      animation: driftUp2 18s linear infinite;
      filter: drop-shadow(0 0 5px rgba(255, 140, 0, 0.8)) blur(0.5px);
    }

    /* שכבה 3 - חלקיקים גדולים וקרובים (מהירים ומטושטשים) */
    .layer-3 {
      background-image: 
        radial-gradient(circle at 30% 40%, rgba(255, 140, 0, 0.3) 4px, transparent 4px),
        radial-gradient(circle at 80% 90%, rgba(255, 100, 0, 0.4) 5px, transparent 5px);
      background-size: 350px 350px;
      animation: driftUp3 12s linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 140, 0, 0.6)) blur(2px);
    }

    /* התנועה האינסופית של החלקיקים באלכסונים מנוגדים */
    @keyframes driftUp1 {
      0% { background-position: 0px 0px; }
      100% { background-position: 150px -150px; }
    }
    @keyframes driftUp2 {
      0% { background-position: 0px 0px; }
      100% { background-position: -220px -220px; }
    }
    @keyframes driftUp3 {
      0% { background-position: 0px 0px; }
      100% { background-position: 350px -350px; }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.1) 56%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 1; /* יושב מעל החלקיקים כדי למסגר את האתר בחושך */
    }

   /* הווטרמארק של הלוגו (עם טריק שמעלים רקע שחור) */
    #watermark-bg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      height: auto;
      opacity: 0.15;
      mix-blend-mode: screen; /* זה הקסם: מעלים את הרקע השחור ומשאיר רק את הלוגו */
      z-index: 0;
      pointer-events: none;
    }
    
    #spotlight {
      position: fixed;
      top: 0;
      left: 0;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, var(--spotlight-color) 0%, transparent 72%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: none;
      opacity: 0.82;
    }

    .main-shell {
      position: relative;
      z-index: 3;
      width: 100%;
    }

    #profile-image-container {
      position: relative;
      transition: all 0.4s ease;
      border: 4px solid rgba(255,255,255,0.55);
      overflow: hidden;
      width: 136px;
      height: 136px;
      isolation: isolate;
    }

    #profile-image-container::before {
      content: "";
      position: absolute;
      inset: -18px;
      background: conic-gradient(from 0deg, #ff5bd8, #62e8ff, #507dff, #ff5bd8);
      animation: rotateRing 4s linear infinite;
      z-index: -2;
    }

    #profile-image-container::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      box-shadow: inset 0 0 28px rgba(0,0,0,0.45);
      pointer-events: none;
      z-index: 2;
    }

    #profile-image-container:hover {
      transform: scale(1.07) rotate(-1deg);
      box-shadow: 0 0 42px var(--accent-glow);
      border-color: var(--accent);
    }

    @keyframes rotateRing {
      to { transform: rotate(360deg); }
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 13px;
      margin-top: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: 0 10px 28px rgba(0,0,0,0.28);
      backdrop-filter: blur(14px);
      min-height: 32px;
    }

    .top-badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .animated-item.item-animate {
      animation: itemDropIn 0.55s cubic-bezier(.18, 1.22, .34, 1) both;
    }

    @keyframes itemDropIn {
      0% {
        opacity: 0;
        transform: translateY(-34px) scale(0.94);
      }
      65% {
        opacity: 1;
        transform: translateY(5px) scale(1.015);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card {
      position: relative;
      z-index: 3;
      display: block;
      overflow: hidden;
      border-radius: 16px;
      padding: 5px;
      cursor: pointer;
      text-decoration: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.02)),
        linear-gradient(145deg, rgba(255, 140, 0, 0.10), rgba(0,0,0,0.4));
      border: 1px solid rgba(255, 140, 0, 0.15);
      border-left: 4px solid rgba(255, 140, 0, 0.4);
      box-shadow:
        0 18px 48px rgba(0,0,0,0.50),
        inset 0 1px 0 rgba(255,255,255,0.08);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 0%, rgba(255,255,255,0.18), transparent 34%),
        radial-gradient(circle at 100% 100%, rgba(255, 140, 0, 0.16), transparent 35%);
      opacity: 0.9;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      top: -70%;
      right: -45%;
      width: 60%;
      height: 220%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: rotate(25deg);
      transition: 0.55s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.018);
      box-shadow:
        0 26px 68px rgba(0,0,0,0.66),
        0 0 34px rgba(255, 124, 0, 0.20);
    }

    .card:hover::after {
      right: 120%;
    }

    .card-inner {
      position: relative;
      z-index: 3;
      min-height: 80px;
      border-radius: 12px;
      background: linear-gradient(145deg, rgba(11, 8, 4, 0.78), rgba(28, 16, 6, 0.68));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 22px;
      overflow: hidden;
    }

    .card-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 4;
    }

    .icon-box {
      position: absolute;
      right: 22px;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      z-index: 5;
    }

    .card-title {
      font-size: 1.35rem;
      line-height: 1;
      font-weight: 900;
    }

    .platform-icon {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      display: inline-block;
    }

    .status-live {
      color: #53fc18;
      text-shadow: 0 0 10px rgba(83, 252, 24, 0.7);
    }

    .status-live .status-dot {
      background: #53fc18;
      box-shadow: 0 0 12px rgba(83, 252, 24, 0.9);
      animation: livePulse 1.2s infinite;
    }

    .status-offline {
      color: #9ca3af;
    }

    .status-offline .status-dot {
      background: #6b7280;
    }

    @keyframes livePulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.45); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    .neon {
      text-shadow: none;
    }

    .site-footer {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
      font-weight: 900;
    }

    .footer-copy {
      color: rgba(255,255,255,0.78);
      font-size: 0.76rem;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.55s ease-out;
      overflow: hidden;
    }

    #splash-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #main-page-content {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.42s ease-in, transform 0.42s ease;
      transform: translateY(18px) scale(0.985);
      min-height: 100vh;
      justify-content: center;
      padding-top: 58px !important;
      padding-bottom: 24px !important;
    }

    #main-page-content.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    #home-section .space-y-4 {
      display: grid;
      gap: 12px;
    }

    #home-section {
      max-width: 430px;
    }

    #home-section .card-inner {
      background:
        radial-gradient(circle at 0% 0%, rgba(255,255,255,0.07), transparent 36%),
        linear-gradient(145deg, rgba(8, 19, 27, 0.78), rgba(29, 22, 49, 0.70));
    }

    #home-section .icon-box {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.14);
    }

    #profile-image-container {
      width: 112px;
      height: 112px;
      border-color: rgba(255, 140, 0, 0.4);
    }

    #profile-image-container::before {
      opacity: 0.55;
    }

    .top-badge {
      margin-top: 8px;
    }

    #home-section .space-y-4 > :not([hidden]) ~ :not([hidden]) {
      margin-top: 0.95rem !important;
    }

    #home-section .card:hover {
      transform: translateY(-6px) scale(1.028);
    }

    #home-section .card-kick:hover {
      border-color: rgba(83, 252, 24, 0.4);
      border-left-color: #53fc18;
      box-shadow: 0 0 34px rgba(83, 252, 24, 0.25), 0 22px 56px rgba(0,0,0,0.56);
    }
    .card-kick .icon-box {
      background: rgba(83, 252, 24, 0.12);
      border-color: rgba(83, 252, 24, 0.28);
    }

    #home-section .card-tiktok:hover {
      border-color: rgba(37, 244, 238, 0.4);
      border-left-color: #25f4ee;
      box-shadow: 0 0 34px rgba(37, 244, 238, 0.20), 0 0 24px rgba(254, 44, 85, 0.15), 0 22px 56px rgba(0,0,0,0.56);
    }

    #home-section .card-instagram:hover {
      border-color: rgba(221, 42, 123, 0.4);
      border-left-color: #dd2a7b;
      box-shadow: 0 0 34px rgba(221, 42, 123, 0.25), 0 22px 56px rgba(0,0,0,0.56);
    }
    .card-instagram .icon-box {
      background: linear-gradient(135deg, rgba(245, 133, 41, 0.16), rgba(221, 42, 123, 0.16), rgba(81, 91, 212, 0.16));
      border-color: rgba(221, 42, 123, 0.32);
    }

    #home-section .card-discord:hover {
      border-color: rgba(88, 101, 242, 0.4);
      border-left-color: #5865F2;
      box-shadow: 0 0 34px rgba(88, 101, 242, 0.25), 0 22px 56px rgba(0,0,0,0.56);
    }
    .card-discord .icon-box {
      background: rgba(88, 101, 242, 0.15);
      border-color: rgba(88, 101, 242, 0.30);
    }

    #home-section .card-youtube:hover {
      border-color: rgba(255, 35, 35, 0.4);
      border-left-color: #ff0000;
      box-shadow: 0 0 34px rgba(255, 35, 35, 0.25), 0 22px 56px rgba(0,0,0,0.56);
    }
    .card-youtube .icon-box {
      background: rgba(255, 0, 0, 0.14);
      border-color: rgba(255, 0, 0, 0.30);
    }

    #home-section .card-gchangers:hover {
      border-color: rgba(255, 140, 0, 0.4);
      border-left-color: #ff8c00;
      box-shadow: 0 0 34px rgba(255, 140, 0, 0.25), 0 22px 56px rgba(0,0,0,0.56);
    }
    .card-gchangers .icon-box {
      background: rgba(255, 140, 0, 0.12);
      border-color: rgba(255, 140, 0, 0.28);
    }

    @media (max-width: 520px) {
      #main-page-content {
        padding-top: 40px !important;
      }
      .card-inner {
        min-height: 72px;
        padding: 14px 17px;
      }
      .icon-box {
        right: 17px;
        width: 44px;
        height: 44px;
        border-radius: 12px;
      }
      .card-title {
        font-size: 1.2rem;
      }
      #profile-image-container {
        width: 124px;
        height: 124px;
      }
    }
  </style>
</head>

          <div class="card-inner">
            <div class="icon-box">
              <svg class="platform-icon text-red-500" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

      <div class="footer-copy">© 2026 RonenGG</div>

  </div>

  <script>
    const spotlight = document.getElementById('spotlight');
    const mainContent = document.getElementById('main-page-content');
    const splash = document.getElementById('splash-screen');
    const kickStatus = document.getElementById('kick-live-status');
    const video = document.getElementById('splash-video');

    document.addEventListener('mousemove', (e) => {
      if (spotlight) {
        spotlight.style.left = e.clientX + 'px';
        spotlight.style.top = e.clientY + 'px';

        const x = e.clientX / Math.max(window.innerWidth, 1);
        const y = e.clientY / Math.max(window.innerHeight, 1);
        const pinkPower = Math.max(0, 1 - Math.hypot(x - 0.18, y - 0.14) * 2.6);
        const leftBluePower = Math.max(0, 1 - Math.hypot(x - 0.02, y - 0.50) * 2.15);
        const rightBluePower = Math.max(0, 1 - Math.hypot(x - 0.98, y - 0.55) * 2.15);
        const bluePower = Math.max(leftBluePower, rightBluePower);
        const whitePower = Math.max(0, 1 - Math.hypot(x - 0.50, y - 0.72) * 1.65);

        const r = Math.round(122 + pinkPower * 54 + whitePower * 60 - bluePower * 18);
        const g = Math.round(140 + bluePower * 44 + whitePower * 64);
        const b = Math.round(185 + bluePower * 58 + whitePower * 54 - pinkPower * 12);
        const a = 0.13 + Math.max(pinkPower, bluePower, whitePower) * 0.11;
        document.documentElement.style.setProperty('--spotlight-color', `rgba(${r}, ${g}, ${b}, ${a.toFixed(2)})`);
      }
    });

    function animateItems() {
      const items = document.querySelectorAll('.animated-item');
      items.forEach((item, index) => {
        item.classList.remove('item-animate');
        item.style.animationDelay = `${index * 90}ms`;
        void item.offsetWidth;
        item.classList.add('item-animate');
      });
    }

    function activateSite() {
      if (splash) splash.style.opacity = '0';

      if (mainContent) mainContent.classList.add('visible');
      if (spotlight) spotlight.style.display = 'block';
      animateItems();

      setTimeout(() => {
        if (splash) splash.style.display = 'none';
      }, 600); 
    }

    let isTransitionStarted = false;

    function checkVideoTime() {
      if (isTransitionStarted || !video.duration) return;

      if (video.currentTime >= video.duration - 0.35) {
        isTransitionStarted = true;
        activateSite();
      } else {
        requestAnimationFrame(checkVideoTime);
      }
    }

    if (video) {
      video.addEventListener('play', () => {
        requestAnimationFrame(checkVideoTime);
      });
      video.addEventListener('error', activateSite);
    } else {
      setTimeout(activateSite, 1850);
    }

    function setKickStatus(isLive) {
      if (!kickStatus) return;
      const text = kickStatus.querySelector('.status-text');
      kickStatus.classList.remove('status-live', 'status-offline');

      if (isLive) {
        kickStatus.classList.add('status-live');
        text.textContent = 'on Live';
      } else {
        kickStatus.classList.add('status-offline');
        text.textContent = 'offline';
      }
    }

    function checkIfLiveFromData(data) {
      return Boolean(
        data?.livestream?.is_live === true ||
        data?.recent_livestream?.is_live === true ||
        data?.current_livestream?.is_live === true ||
        data?.stream?.is_live === true ||
        (data?.livestream && data.livestream !== null && data.livestream.is_live !== false)
      );
    }

    async function fetchJsonWithFallback(url) {
      const urlsToTry = [
        url,
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
        'https://corsproxy.io/?' + encodeURIComponent(url)
      ];

      for (const currentUrl of urlsToTry) {
        try {
          const response = await fetch(currentUrl, { cache: 'no-store' });
          if (!response.ok) continue;
          return await response.json();
        } catch (error) {
          console.log('Fetch JSON failed:', currentUrl, error);
        }
      }
      throw new Error('Could not fetch JSON');
    }

    async function checkKickLiveStatus() {
      try {
        const data = await fetchJsonWithFallback('https://kick.com/api/v2/channels/ronengg');
        const isLive = checkIfLiveFromData(data);
        setKickStatus(isLive);
      } catch (error) {
        console.log('Could not check Kick live status:', error);
        setKickStatus(false);
      }
    }

    checkKickLiveStatus();
    setInterval(checkKickLiveStatus, 60000);
  </script>
